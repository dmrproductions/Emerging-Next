<script>

// ======================================
// DESIGNERS FOR EMERGING NEXT (BY EMAIL)
// ======================================
const EMERGING_NEXT_DESIGNERS = {
  "renalizabeth@gmail.com": {
    displayName: "Rena Hembrock",
    brand: "Rena Elizabeth",
    group: "rfa"
  },
  "juliekong2121@yahoo.com": {
    displayName: "Julie Kong",
    brand: "Sugarcane Sweet Designs",
    group: "rfa"
  },
  "dlrdesigns2012@gmail.com": {
    displayName: "Decarol l. Randle",
    brand: "DLR Designs",
    group: "rfa"
  },
  "antonia@kostelecbridal.com": {
    displayName: "Antonia Kostelec",
    brand: "Kostelec Bridal",
    group: "rfa"
  },
  "ivayodesign@gmail.com": {
    displayName: "Anita Ivayo",
    brand: "LiBush Africa",
    group: "individual"
  },
  "myralowder@yahoo.com": {
    displayName: "Myra Lowder",
    brand: "Myra Kim Designs",
    group: "individual"
  },
  "mikanicolaypr@gmail.com": {
    displayName: "Tamika Huff",
    brand: "Nicolay",
    group: "individual"
  }
};

// ==============================
// GOOGLE SHEET CONFIG
// ==============================
const SHEET_ID = "182FSLFP7ATG_chpzv1thZ9wh_tJEIprsrRgpK1LYG5w";
const SHEET_NAME = "Designer_Selections";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

async function fetchSheetData() {
  const response = await fetch(SHEET_URL);
  const text = await response.text();
  const json = JSON.parse(text.substring(47).slice(0, -2));
  return json.table.rows.map(r => r.c.map(c => c ? c.v : ""));
}

function buildShowcase(rows) {

  const COL_EMAIL = 2;
  const COL_MODEL = 3;
  const COL_APPROVAL = 6;

  const designers = {};
  const usage = {};

  rows.forEach(row => {

    const email = row[COL_EMAIL]?.toString().trim().toLowerCase();
    const modelNum = row[COL_MODEL]?.toString().trim();
    const approval = row[COL_APPROVAL]?.toString().toLowerCase();

    if (!EMERGING_NEXT_DESIGNERS[email]) return;
    if (!modelNum) return;

    if (!designers[email]) {
      designers[email] = { models: [], confirmed: [] };
    }

    designers[email].models.push(modelNum);

    if (approval && approval.includes("approved")) {
      designers[email].confirmed.push(modelNum);
    }

    if (!usage[modelNum]) usage[modelNum] = [];
    usage[modelNum].push(email);
  });

  // Clear containers
  document.getElementById("rfa").innerHTML = "";
  document.getElementById("individual").innerHTML = "";

  Object.keys(EMERGING_NEXT_DESIGNERS).forEach(email => {

    const meta = EMERGING_NEXT_DESIGNERS[email];
    const container = document.getElementById(meta.group);

    const modelList = designers[email]?.models || [];
    const confirmedList = designers[email]?.confirmed || [];

    const card = document.createElement("div");
    card.className = "designer";

    card.innerHTML = `
      <h2>${meta.displayName}</h2>
      <h3>${meta.brand}</h3>
      <div class="email">${email}</div>
      <div class="looks-count">${modelList.length} Looks</div>
    `;

    modelList.forEach(modelNum => {

      const isConfirmed = confirmedList.includes(modelNum);
      const conflictCount = usage[modelNum]?.length || 0;

      const modelDiv = document.createElement("div");
      modelDiv.className = "model";

      let badge = `<span class="badge pending-badge">⏳ PENDING</span>`;

      if (isConfirmed) {
        modelDiv.classList.add("confirmed");
        badge = `<span class="badge confirmed-badge">✓ CONFIRMED</span>`;
      }
      else if (conflictCount > 1) {
        modelDiv.classList.add(conflictCount >= 3 ? "conflict-3way" : "conflict");
        badge = `<span class="badge ${conflictCount >= 3 ? "conflict-3way-badge" : "conflict-badge"}">⚠ CONFLICT</span>`;
      }

      modelDiv.innerHTML = `
        <strong>#${modelNum}</strong>
        ${badge}
      `;

      card.appendChild(modelDiv);
    });

    container.appendChild(card);
  });
}

fetchSheetData().then(buildShowcase);

</script>
