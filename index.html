<script>

// ================================
// DESIGNERS FOR THIS SHOW ONLY
// ================================
const EMERGING_NEXT_DESIGNERS = {
  "Rena Hembrock": { brand: "Rena Elizabeth", email: "renalizabeth@gmail.com", group: "rfa" },
  "Julie Kong": { brand: "Sugarcane Sweet Designs", email: "juliekong2121@yahoo.com", group: "rfa" },
  "Decarol l. Randle": { brand: "DLR Designs", email: "dlrdesigns2012@gmail.com", group: "rfa" },
  "Antonia Kostelec": { brand: "Kostelec Bridal", email: "antonia@kostelecbridal.com", group: "rfa" },

  "Anita Ivayo": { brand: "LiBush Africa", email: "ivayodesign@gmail.com", group: "individual" },
  "Myra Lowder": { brand: "Myra Kim Designs", email: "myralowder@yahoo.com", group: "individual" },
  "Tamika Huff": { brand: "Nicolay", email: "mikanicolaypr@gmail.com", group: "individual" }
};

// ================================
// GOOGLE SHEET CONFIG
// ================================
const SHEET_ID = "182FSLFP7ATG_chpzv1thZ9wh_tJEIprsrRgpK1LYG5w";
const SHEET_NAME = "Designer_Selections";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

// ================================
// FETCH DATA
// ================================
async function fetchSheetData() {
  const response = await fetch(SHEET_URL);
  const text = await response.text();

  const json = JSON.parse(text.substring(47).slice(0, -2));
  return json.table.rows.map(r => r.c.map(c => c ? c.v : ""));
}

// ================================
// BUILD SHOWCASE
// ================================
function buildShowcase(rows) {

  // Adjust these if your column order changes
  const COL_DESIGNER = 1;
  const COL_MODEL = 3;
  const COL_ADMIN_APPROVAL = 6;

  const designers = {};
  const usage = {};

  rows.forEach(row => {

    const designerName = row[COL_DESIGNER]?.toString().trim();
    const modelNum = row[COL_MODEL]?.toString().trim();
    const approval = row[COL_ADMIN_APPROVAL]?.toString().toLowerCase();

    if (!EMERGING_NEXT_DESIGNERS[designerName]) return;
    if (!modelNum) return;

    if (!designers[designerName]) {
      designers[designerName] = { models: [], confirmed: [] };
    }

    designers[designerName].models.push(modelNum);

    if (approval && approval.includes("approved")) {
      designers[designerName].confirmed.push(modelNum);
    }

    if (!usage[modelNum]) usage[modelNum] = [];
    usage[modelNum].push(designerName);
  });

  // Clear containers
  document.getElementById("rfa").innerHTML = "";
  document.getElementById("individual").innerHTML = "";

  Object.keys(EMERGING_NEXT_DESIGNERS).forEach(designerName => {

    const meta = EMERGING_NEXT_DESIGNERS[designerName];
    const container = document.getElementById(meta.group);

    const card = document.createElement("div");
    card.className = "designer";

    const modelList = designers[designerName]?.models || [];
    const confirmedList = designers[designerName]?.confirmed || [];

    card.innerHTML = `
      <h2>${designerName}</h2>
      <h3>${meta.brand}</h3>
      <div class="email">${meta.email}</div>
      <div class="looks-count">${modelList.length} Looks</div>
    `;

    modelList.forEach(modelNum => {

      const isConfirmed = confirmedList.includes(modelNum);
      const conflictCount = usage[modelNum]?.length || 0;

      const modelDiv = document.createElement("div");
      modelDiv.className = "model";

      let badge = `<span class="badge pending-badge">⏳ PENDING</span>`;

      if (isConfirmed) {
        modelDiv.classList.add("confirmed");
        badge = `<span class="badge confirmed-badge">✓ CONFIRMED</span>`;
      }
      else if (conflictCount > 1) {
        modelDiv.classList.add(conflictCount >= 3 ? "conflict-3way" : "conflict");
        badge = `<span class="badge ${conflictCount >= 3 ? "conflict-3way-badge" : "conflict-badge"}">⚠ CONFLICT</span>`;
      }

      modelDiv.innerHTML = `
        <div>
          <strong>#${modelNum}</strong>
          ${badge}
        </div>
      `;

      card.appendChild(modelDiv);
    });

    container.appendChild(card);
  });
}

// ================================
// INIT
// ================================
fetchSheetData().then(buildShowcase);

</script>
